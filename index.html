<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yashas</title>
  <meta name="description" content="yashas — builder / maker">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #060608;
      color: #e8e0d4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .name {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(64px, 14vw, 140px);
      font-weight: 400;
      color: #e8e0d4;
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 16px;
      cursor: default;
    }

    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      color: #5a5549;
      letter-spacing: 0.08em;
      margin-bottom: 56px;
      min-height: 20px;
    }

    .tagline .cursor {
      display: inline-block;
      width: 1px;
      height: 14px;
      background: #5a5549;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .link {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 400;
      color: #6b6359;
      text-decoration: none;
      padding: 14px 0;
      position: relative;
      transition: color 0.3s ease;
      letter-spacing: 0.02em;
    }

    .link:hover { color: #c8b88a; }

    .link::after {
      content: '';
      position: absolute;
      bottom: 10px;
      left: 50%;
      width: 0;
      height: 1px;
      background: #c8b88a;
      transition: width 0.3s ease, left 0.3s ease;
    }

    .link:hover::after {
      width: 100%;
      left: 0;
    }

    .link:nth-child(1) { animation: fadeUp 0.6s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .link:nth-child(2) { animation: fadeUp 0.6s 0.42s cubic-bezier(0.16, 1, 0.3, 1) both; }

    .footer {
      position: fixed;
      bottom: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      opacity: 0;
      animation: fadeUp 0.6s 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .footer a {
      color: #3a3731;
      text-decoration: none;
      transition: color 0.3s ease;
      display: flex;
      align-items: center;
    }

    .footer a:hover { color: #c8b88a; }
    .footer a svg { fill: currentColor; }
    .cave-text { color: #1a1916; }

    /* gauntlet */
    .gauntlet {
      position: fixed;
      bottom: 20px;
      right: 24px;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.6s 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
      transition: transform 0.2s ease, filter 0.2s ease;
      user-select: none;
    }

    .gauntlet:hover {
      transform: scale(1.08);
      filter: drop-shadow(0 0 8px rgba(200, 184, 138, 0.4));
    }

    .gauntlet:active { transform: scale(0.95); }

    /* snap overlay */
    .snap-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
    }

    /* arc reactor */
    .arc-reactor {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      opacity: 0;
      z-index: 1001;
      pointer-events: none;
    }

    /* dust canvas */
    #dust-canvas {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
    }

    @media (max-width: 500px) {
      .name { letter-spacing: -1px; }
      .tagline { margin-bottom: 40px; }
    }
  </style>
</head>
<body>

<canvas id="dust-canvas"></canvas>

<!-- infinity gauntlet SVG -->
<div class="gauntlet" id="gauntlet" title="snap.">
  <svg width="36" height="52" viewBox="0 0 36 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- fingers -->

    <rect x="10" y="0" width="4" height="12" rx="2" fill="#d4b85c"/>

    <rect x="22" y="0" width="4" height="10" rx="2" fill="#d4b85c"/>
    <!-- thumb -->

    <!-- knuckle lines -->

    <!-- wrist ridges -->
    <line x1="7" y1="33" x2="23" y2="33" stroke="#c8a84e" stroke-width="0.8" opacity="0.4"/>

    <rect x="7" y="42" width="16" height="8" rx="2" fill="#b89840"/>

    <!-- INFINITY STONES -->

    <circle cx="15" cy="19" r="2.5" fill="#eab308">

    </circle>
    <!-- power - purple (ring finger) -->
    <circle cx="8" cy="14" r="1.5" fill="#a855f7">

<script>
// ─── TYPEWRITER ───
const typed = document.getElementById('typed');
const typeSpeed = 60;
const deleteSpeed = 30;

const sequence = [
  { action: 'type', text: 'genius, billionaire' },
  { action: 'pause', ms: 800 },
  { action: 'delete', chars: 'billionaire'.length },
  { action: 'pause', ms: 400 },
  { action: 'type', text: 'broke' },
  { action: 'type', text: ', playboy, philanthropist' },
  { action: 'pause', ms: 3000 },
  { action: 'clear' },
  { action: 'pause', ms: 600 },
];

let current = '';
let stepIndex = 0;

function runStep() {
  if (stepIndex >= sequence.length) stepIndex = 0;
  const step = sequence[stepIndex++];

  if (step.action === 'type') {
    let i = 0;
    const iv = setInterval(() => {
      current += step.text[i++];
      typed.textContent = current;
      if (i >= step.text.length) { clearInterval(iv); runStep(); }
    }, typeSpeed);
  } else if (step.action === 'delete') {
    let rem = step.chars;
    const iv = setInterval(() => {
      current = current.slice(0, -1);
      typed.textContent = current;
      if (--rem <= 0) { clearInterval(iv); runStep(); }
    }, deleteSpeed);
  } else if (step.action === 'pause') {
    setTimeout(runStep, step.ms);
  } else if (step.action === 'clear') {
    const iv = setInterval(() => {
      current = current.slice(0, -1);
      typed.textContent = current;
      if (!current.length) { clearInterval(iv); runStep(); }
    }, deleteSpeed);
  }
}

setTimeout(runStep, 800);

// ─── SOUND ENGINE (Web Audio API) ───
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSnap() {
  const ctx = getAudio();
  // sharp transient click
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const t = i / ctx.sampleRate;
    data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 80) * 0.7;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.value = 0.5;
  src.connect(gain).connect(ctx.destination);
  src.start();
}

function playWhoosh() {
  const ctx = getAudio();
  const duration = 0.8;
  const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const t = i / ctx.sampleRate;
    const env = Math.sin(t / duration * Math.PI) * 0.3;
    data[i] = (Math.random() * 2 - 1) * env;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  // bandpass to make it swooshy
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(800, ctx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + duration);
  filter.Q.value = 1.5;
  const gain = ctx.createGain();
  gain.gain.value = 0.4;
  src.connect(filter).connect(gain).connect(ctx.destination);
  src.start();
}

function playDissolve() {
  const ctx = getAudio();
  const duration = 1.5;
  const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const t = i / ctx.sampleRate;
    // crackling dust sound
    const crackle = Math.random() > 0.97 ? (Math.random() * 2 - 1) * 0.4 : 0;
    const hiss = (Math.random() * 2 - 1) * 0.08 * Math.exp(-t * 2);
    data[i] = (crackle + hiss) * (1 - t / duration);
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 2000;
  const gain = ctx.createGain();
  gain.gain.value = 0.6;
  src.connect(filter).connect(gain).connect(ctx.destination);
  src.start();
}

function playReactorHum() {
  const ctx = getAudio();
  // low pulsing hum
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 90;
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 135;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.8);
  gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 2.5);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 3.5);
  const gain2 = ctx.createGain();
  gain2.gain.value = 0.06;
  osc.connect(gain).connect(ctx.destination);
  osc2.connect(gain2).connect(gain);
  osc.start();
  osc2.start();
  osc.stop(ctx.currentTime + 3.5);
  osc2.stop(ctx.currentTime + 3.5);
}

function playIronManTone() {
  const ctx = getAudio();
  // cinematic low tone + shimmer
  const osc = ctx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.value = 65;
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 196; // G3 - heroic
  const osc3 = ctx.createOscillator();
  osc3.type = 'sine';
  osc3.frequency.value = 262; // C4
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.3);
  gain.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 1.5);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2.8);
  const gain2 = ctx.createGain();
  gain2.gain.setValueAtTime(0, ctx.currentTime);
  gain2.gain.linearRampToValueAtTime(0.05, ctx.currentTime + 0.5);
  gain2.gain.linearRampToValueAtTime(0, ctx.currentTime + 2.8);
  osc.connect(gain).connect(ctx.destination);
  osc2.connect(gain2).connect(ctx.destination);
  osc3.connect(gain2);
  osc.start(); osc2.start(); osc3.start();
  osc.stop(ctx.currentTime + 3); osc2.stop(ctx.currentTime + 3); osc3.stop(ctx.currentTime + 3);
}

function playReassemble() {
  const ctx = getAudio();
  // rising shimmer
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(200, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.6);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.08, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.7);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.8);
}

// ─── SNAP EFFECT ───
const dustCanvas = document.getElementById('dust-canvas');
const dctx = dustCanvas.getContext('2d');
let particles = [];
let snapping = false;

function resizeCanvas() {
  dustCanvas.width = window.innerWidth;
  dustCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.ox = x;
    this.oy = y;
    this.color = color;
    this.size = Math.random() * 3 + 1;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = (Math.random() - 0.7) * 3;
    this.life = 1;
    this.decay = Math.random() * 0.008 + 0.005;
    this.gravity = Math.random() * 0.02 + 0.01;
    this.wind = (Math.random() - 0.5) * 0.3;
  }
  update() {
    this.vy += this.gravity;
    this.vx += this.wind * 0.01;
    this.vx *= 0.99;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

function spawnDust(x, y, count, colors) {
  for (let i = 0; i < count; i++) {
    const px = x + (Math.random() - 0.5) * 100;
    const py = y + (Math.random() - 0.5) * 60;
    particles.push(new Particle(px, py, colors[Math.floor(Math.random() * colors.length)]));
  }
}

let animating = false;
function animateDust() {
  if (!animating) return;
  dctx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(dctx); });
  dctx.globalAlpha = 1;
  if (particles.length > 0) {
    requestAnimationFrame(animateDust);
  } else {
    animating = false;
    dctx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
  }
}

// arc reactor draw
function drawArcReactor() {
  const el = document.getElementById('arc-reactor');
  const size = 120;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const cx = size / 2, cy = size / 2;

  // outer ring
  ctx.strokeStyle = '#5edfff';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#5edfff';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(cx, cy, 50, 0, Math.PI * 2);
  ctx.stroke();

  // inner ring
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, 35, 0, Math.PI * 2);
  ctx.stroke();

  // core glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 25);
  grad.addColorStop(0, 'rgba(94, 223, 255, 0.9)');
  grad.addColorStop(0.5, 'rgba(94, 223, 255, 0.3)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, 25, 0, Math.PI * 2);
  ctx.fill();

  // center dot
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fill();

  // triangle segments
  ctx.shadowBlur = 8;
  ctx.strokeStyle = '#5edfff';
  ctx.lineWidth = 2;
  for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2 - Math.PI / 2;
    const innerR = 28;
    const outerR = 42;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle - 0.12) * innerR, cy + Math.sin(angle - 0.12) * innerR);
    ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
    ctx.lineTo(cx + Math.cos(angle + 0.12) * innerR, cy + Math.sin(angle + 0.12) * innerR);
    ctx.stroke();
  }

  el.style.background = `url(${c.toDataURL()}) center/contain no-repeat`;
}

drawArcReactor();

// snap sequence
document.getElementById('gauntlet').addEventListener('click', () => {
  if (snapping) return;
  snapping = true;

  const mainContent = document.getElementById('main-content');
  const footer = document.getElementById('footer-el');
  const reactor = document.getElementById('arc-reactor');

  // phase 1: golden power surge from gauntlet (0ms)
  const stoneColors = ['#eab308', '#3b82f6', '#ef4444', '#a855f7', '#f97316', '#22c55e'];
  const gauntletRect = document.getElementById('gauntlet').getBoundingClientRect();
  const gx = gauntletRect.left + gauntletRect.width / 2;
  const gy = gauntletRect.top + gauntletRect.height / 2;

  playSnap();
  animating = true;
  spawnDust(gx, gy, 80, stoneColors);
  animateDust();

  // phase 2: screen flash + shockwave (300ms)
  setTimeout(() => {
    playWhoosh();
    // golden flash
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:radial-gradient(circle at ' + gx + 'px ' + gy + 'px, rgba(234,179,8,0.5), rgba(200,168,78,0.2), transparent 70%);z-index:998;pointer-events:none;';
    document.body.appendChild(flash);
    flash.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 800, easing: 'ease-out' }).onfinish = () => flash.remove();

    // shockwave ring
    const ring = document.createElement('div');
    ring.style.cssText = `position:fixed;left:${gx}px;top:${gy}px;width:0;height:0;border-radius:50%;border:2px solid rgba(234,179,8,0.6);z-index:998;pointer-events:none;transform:translate(-50%,-50%);`;
    document.body.appendChild(ring);
    ring.animate([
      { width: '0px', height: '0px', opacity: 1, borderWidth: '3px' },
      { width: '200vmax', height: '200vmax', opacity: 0, borderWidth: '1px' }
    ], { duration: 1000, easing: 'ease-out' }).onfinish = () => ring.remove();
  }, 300);

  // phase 3: everything dissolves into dust (600ms)
  setTimeout(() => {
    playDissolve();
    const rect = mainContent.getBoundingClientRect();
    spawnDust(rect.left + rect.width / 2, rect.top + rect.height / 2, 200, ['#e8e0d4', '#c8b88a', '#5a5549', '#eab308']);

    mainContent.style.transition = 'opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease';
    mainContent.style.opacity = '0';
    mainContent.style.filter = 'blur(8px)';
    mainContent.style.transform = 'translateY(-30px) scale(0.97)';

    footer.style.transition = 'opacity 0.8s ease';
    footer.style.opacity = '0';
  }, 600);

  // phase 4: screen goes dark, then arc reactor fades in (2000ms)
  setTimeout(() => {
    playReactorHum();
    // darken
    document.body.style.transition = 'background 0.8s ease';
    document.body.style.background = '#020204';

    // arc reactor appears — force start state, then animate in next frame
    reactor.style.transition = 'none';
    reactor.style.opacity = '0';
    reactor.style.transform = 'translate(-50%, -50%) scale(0)';
    requestAnimationFrame(() => {
      reactor.style.transition = 'opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1)';
      reactor.style.opacity = '1';
      reactor.style.transform = 'translate(-50%, -50%) scale(1)';
    });

    // reactor glow pulse
    reactor.animate([
      { filter: 'drop-shadow(0 0 20px rgba(94, 223, 255, 0.4))' },
      { filter: 'drop-shadow(0 0 60px rgba(94, 223, 255, 0.8))' },
      { filter: 'drop-shadow(0 0 30px rgba(94, 223, 255, 0.5))' },
    ], { duration: 1500, easing: 'ease-in-out' });
  }, 2000);

  // phase 5: reactor pulses brighter (3500ms)
  setTimeout(() => {
    playIronManTone();
    // reactor grows and intensifies
    reactor.animate([
      { transform: 'translate(-50%, -50%) scale(1)', filter: 'drop-shadow(0 0 30px rgba(94, 223, 255, 0.5))' },
      { transform: 'translate(-50%, -50%) scale(1.3)', filter: 'drop-shadow(0 0 80px rgba(94, 223, 255, 1))' },
      { transform: 'translate(-50%, -50%) scale(1.5)', filter: 'drop-shadow(0 0 120px rgba(94, 223, 255, 1))' },
    ], { duration: 1500, easing: 'ease-in', fill: 'forwards' });
  }, 3500);

  // phase 6: blue blast — reactor explodes outward, page reassembles from the light (5200ms)
  setTimeout(() => {
    // blue flash that fills the screen from center
    const blast = document.createElement('div');
    blast.style.cssText = 'position:fixed;inset:0;z-index:1003;pointer-events:none;background:radial-gradient(circle at 50% 50%, rgba(94,223,255,0.9), rgba(94,223,255,0.4) 40%, transparent 70%);';
    document.body.appendChild(blast);

    playReassemble();

    // hide reactor instantly behind the blast
    reactor.style.transition = 'none';
    reactor.style.opacity = '0';
    reactor.style.transform = 'translate(-50%, -50%) scale(0)';

    // blast fades as content comes back
    blast.animate([
      { opacity: 1 },
      { opacity: 0.6 },
      { opacity: 0 }
    ], { duration: 1000, easing: 'ease-out' }).onfinish = () => blast.remove();

    // restore background
    document.body.style.transition = 'background 0.6s ease';
    document.body.style.background = '#060608';

    // content reassembles out of the blue light
    mainContent.style.transition = 'opacity 0.8s ease 0.15s, filter 0.8s ease 0.15s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s';
    mainContent.style.opacity = '1';
    mainContent.style.filter = 'none';
    mainContent.style.transform = 'translateY(0) scale(1)';

    footer.style.transition = 'opacity 0.6s ease 0.3s';
    footer.style.opacity = '1';

    setTimeout(() => { snapping = false; }, 1200);
  }, 5200);
});
</script>

</body>
</html>
